host: localhost:8080
info:
  contact:
    email: support@pantheon-platform.com
    name: API Support
    url: http://www.pantheon-platform.com/support
  description: Enterprise multi-tenant RBAC platform API.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Pantheon Platform API
  version: "1.0"
paths:
  /auth/2fa/backup-codes:
    post:
      consumes:
      - application/json
      description: Generate new backup codes for the current user.
      parameters:
      - description: Backup code payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.GenerateBackupCodesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authBackupCodesEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorDetail'
      security:
      - ApiKeyAuth: []
      summary: Regenerate Backup Codes
      tags:
      - Authentication
  /auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disable two-factor authentication for the current user.
      parameters:
      - description: Disable 2FA payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.Disable2FARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authMessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorDetail'
      security:
      - ApiKeyAuth: []
      summary: Disable 2FA
      tags:
      - Authentication
  /auth/2fa/enable:
    post:
      consumes:
      - application/json
      description: Start two-factor authentication setup for the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authTwoFactorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorDetail'
      security:
      - ApiKeyAuth: []
      summary: Start 2FA Setup
      tags:
      - Authentication
  /auth/2fa/login:
    post:
      consumes:
      - application/json
      description: Complete login after password validation and 2FA verification.
      parameters:
      - description: Login 2FA payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.Login2FAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.authLoginEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorDetail'
      summary: Complete Login With 2FA
